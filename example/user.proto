syntax = "proto3";

package example;

option go_package = "github.com/mogumc/sqlitex/example/generated";

import "sqlitex/options.proto";

message User {
  option (sqlitex.table).primary_key = "id";

  int64 id = 1 [(sqlitex.field).primary_key = true];
  string name = 2;
  string email = 3;
  int64 created_at = 4;
  bool active = 5;
}
